services:
  - type: web
    name: telegram-converter-bot
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      apt-get update && apt-get install -y ffmpeg || true
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        value: 7677822008:AAGv3IWbNrQEJM12v1z1oFAKIVw8ICi26hY
      - key: RENDER_URL
        sync: false   # Set this manually after deploy: https://your-app.onrender.com
    healthCheckPath: /ping
    autoDeploy: true
